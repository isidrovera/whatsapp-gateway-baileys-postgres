services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp_gateway
      POSTGRES_USER: whatsapp_gateway
      POSTGRES_PASSWORD: whatsapp_gateway_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_gateway -d whatsapp_gateway"]
      interval: 10s
      timeout: 5s
      retries: 10

  whatsapp-gateway:
    build: .
    container_name: whatsapp-gateway-baileys
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://whatsapp_gateway:whatsapp_gateway_change_me@postgres:5432/whatsapp_gateway?schema=public
      NODE_ENV: production
    ports:
      - "3105:3105"
    volumes:
      - gateway_storage:/app/storage

volumes:
  postgres_data:
  gateway_storage: