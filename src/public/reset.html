<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer contraseña · WhatsApp Gateway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #059669;
      --danger: #dc2626;
      --warning: #d97706;
      --dark: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 4px 18px rgba(0,0,0,.10);
      border: 1px solid #e5e7eb;
      width: 100%;
      max-width: 420px;
    }
    h1 { margin: 0 0 6px; font-size: 22px; color: var(--dark); }
    .subtitle { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.45; }
    label { display: block; margin-top: 12px; font-size: 13px; font-weight: bold; }
    input {
      width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border);
      border-radius: 9px; outline: none; font-size: 14px;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    button {
      border: none; border-radius: 9px; padding: 11px 14px; margin-top: 18px;
      cursor: pointer; background: var(--primary); color: white; font-weight: bold;
      font-size: 14px; width: 100%;
    }
    button:hover { background: var(--primary-dark); }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .alert {
      padding: 10px 12px; border-radius: 9px; margin-top: 14px;
      font-size: 13px; display: none;
    }
    .alert.error { background: #fee2e2; color: #991b1b; }
    .alert.success { background: #dcfce7; color: #166534; }
    .alert.warning { background: #fef3c7; color: #92400e; }
    .pill {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      background: #eef2ff; color: #3730a3; font-weight: bold; font-size: 12px; margin-bottom: 12px;
    }
    .links {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
    }
    .links a { color: var(--primary); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    #form { display: none; }
    #invalidBox { display: none; }
    .loading { color: var(--muted); font-size: 14px; text-align: center; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="card">
    <span class="pill">Recuperar acceso</span>
    <h1>Restablecer contraseña</h1>

    <div id="loadingBox" class="loading">Validando enlace...</div>

    <div id="form">
      <p class="subtitle">Hola <b id="userLabel"></b>. Ingresa tu nueva contraseña.</p>

      <label for="password">Nueva contraseña</label>
      <input id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />

      <label for="password2">Repetir contraseña</label>
      <input id="password2" type="password" placeholder="Repite la contraseña" autocomplete="new-password" />

      <button id="submitBtn" onclick="submitReset()">Cambiar contraseña</button>

      <div id="alert" class="alert"></div>
    </div>

    <div id="invalidBox">
      <p class="subtitle" id="invalidMsg"></p>
      <div class="links">
        <a href="/static/forgot.html">Solicitar un enlace nuevo</a>
      </div>
    </div>

    <div class="links">
      <a href="/static/login.html">← Volver al inicio de sesión</a>
    </div>
  </div>

<script>
  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token') || '';
  }

  function showAlert(type, message) {
    const el = document.getElementById('alert');
    el.className = 'alert ' + type;
    el.textContent = message;
    el.style.display = 'block';
  }
  function hideAlert() { document.getElementById('alert').style.display = 'none'; }

  function showInvalid(message) {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('form').style.display = 'none';
    document.getElementById('invalidBox').style.display = 'block';
    document.getElementById('invalidMsg').textContent = message;
  }

  function showForm(username) {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('form').style.display = 'block';
    document.getElementById('userLabel').textContent = username || '';
  }

  async function validateAndShow() {
    const token = getToken();
    if (!token) {
      showInvalid('Enlace inválido: falta el token.');
      return;
    }
    try {
      const res = await fetch('/api/password-reset/validate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        showInvalid(data.message || 'Enlace inválido o expirado.');
        return;
      }
      showForm(data.username);
    } catch (e) {
      showInvalid('Error de red validando el enlace.');
    }
  }

  async function submitReset() {
    hideAlert();
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const token = getToken();

    if (password.length < 8) {
      showAlert('error', 'La contraseña debe tener al menos 8 caracteres.');
      return;
    }
    if (password !== password2) {
      showAlert('error', 'Las contraseñas no coinciden.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Guardando...';

    try {
      const res = await fetch('/api/password-reset/consume', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });
      const data = await res.json();

      if (!res.ok || !data.ok) {
        showAlert('error', data.message || 'No se pudo cambiar la contraseña.');
        btn.disabled = false;
        btn.textContent = 'Cambiar contraseña';
        return;
      }

      showAlert('success', 'Contraseña cambiada. Redirigiendo al inicio de sesión...');
      setTimeout(() => { window.location.href = '/static/login.html'; }, 1200);
    } catch (e) {
      showAlert('error', 'Error de red. Revisa la conexión.');
      btn.disabled = false;
      btn.textContent = 'Cambiar contraseña';
    }
  }

  document.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') submitReset();
  });

  validateAndShow();
</script>
</body>
</html>
