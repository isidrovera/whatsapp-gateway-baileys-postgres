<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Plantillas de correo · WhatsApp Gateway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #059669;
      --danger: #dc2626;
      --warning: #d97706;
      --dark: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; color: #1f2937; }

    header {
      background: var(--dark); color: white; padding: 18px 24px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    }
    header h1 { margin: 0; font-size: 22px; }
    .back-btn {
      background: rgba(255,255,255,.15); color: white; border: none;
      border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; text-decoration: none;
    }
    .back-btn:hover { background: rgba(255,255,255,.25); }

    main { max-width: 1080px; margin: 24px auto; padding: 0 16px 40px; }

    .card {
      background: var(--card); border-radius: 14px; padding: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08); border: 1px solid #e5e7eb; margin-bottom: 16px;
    }
    h2 { margin: 0 0 12px; font-size: 18px; }
    label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; }
    input, select, textarea {
      width: 100%; padding: 10px; margin-top: 5px;
      border: 1px solid var(--border); border-radius: 9px; outline: none; font-size: 14px;
    }
    textarea { min-height: 180px; resize: vertical; font-family: monospace; font-size: 13px; }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 12px; }

    button {
      border: none; border-radius: 9px; padding: 10px 14px; cursor: pointer;
      background: var(--primary); color: white; font-weight: bold; font-size: 14px;
    }
    button:hover { background: var(--primary-dark); }
    button.secondary { background: #4b5563; }
    button.secondary:hover { background: #374151; }
    button.success { background: var(--success); }
    button.danger { background: var(--danger); }
    button.small { padding: 7px 10px; font-size: 12px; }

    .muted { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 999px;
      font-size: 11px; font-weight: bold; margin-left: 6px;
    }
    .badge.system { background: #e0e7ff; color: #3730a3; }
    .badge.custom { background: #dcfce7; color: #166534; }
    .badge.inactive { background: #fee2e2; color: #991b1b; }

    .templates-list { display: grid; gap: 8px; margin-top: 10px; }
    .tpl-item {
      border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; background: #f9fafb;
      cursor: pointer; transition: background .15s;
    }
    .tpl-item:hover { background: #f1f5f9; }
    .tpl-item.active { background: #eef2ff; border-color: var(--primary); }
    .tpl-code { font-weight: bold; font-family: monospace; font-size: 13px; }
    .tpl-name { font-size: 13px; color: var(--muted); }

    .preview-box {
      margin-top: 12px; padding: 14px; border: 1px solid var(--border); border-radius: 9px;
      background: white; max-height: 400px; overflow: auto;
    }
    .preview-header {
      padding-bottom: 8px; margin-bottom: 8px; border-bottom: 1px solid #e5e7eb;
      font-size: 13px; color: var(--muted);
    }

    .alert { padding: 10px 12px; border-radius: 9px; margin-top: 14px; font-size: 13px; }
    .alert.error { background: #fee2e2; color: #991b1b; }
    .alert.success { background: #dcfce7; color: #166534; }
    .alert.info { background: #dbeafe; color: #1e40af; }

    .var-chip {
      display: inline-block; padding: 3px 9px; border-radius: 999px;
      background: #f1f5f9; color: #1e3a8a; font-family: monospace; font-size: 12px;
      margin: 2px 4px 2px 0; cursor: pointer;
    }
    .var-chip:hover { background: #dbeafe; }

    .layout-2 {
      display: grid; grid-template-columns: 320px 1fr; gap: 16px;
    }
    @media (max-width: 800px) { .layout-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Plantillas de correo</h1>
    <a class="back-btn" href="/">← Volver al panel</a>
  </header>

  <main>
    <div class="layout-2">

      <div>
        <section class="card">
          <h2>Plantillas</h2>
          <div class="row">
            <button class="secondary small" onclick="loadTemplates()">Actualizar lista</button>
            <button class="success small" onclick="openNewForm()">+ Nueva</button>
          </div>
          <div id="templatesList" class="templates-list">
            <div class="muted">Cargando...</div>
          </div>
        </section>
      </div>

      <div>
        <section class="card" id="editorCard" style="display:none;">
          <h2 id="editorTitle">Editar plantilla</h2>

          <label>Código</label>
          <input id="code" placeholder="MI_PLANTILLA" />
          <div class="muted">MAYÚSCULAS_CON_GUIONES_BAJOS. Solo editable al crear.</div>

          <label>Nombre</label>
          <input id="name" placeholder="Nombre legible" />

          <label>Descripción</label>
          <input id="description" placeholder="Para qué sirve esta plantilla" />

          <label>Asunto</label>
          <input id="subject" placeholder="Asunto del email" />

          <div id="variablesBox" style="display:none;">
            <label>Variables disponibles</label>
            <div id="variablesChips"></div>
          </div>

          <label>Cuerpo HTML</label>
          <textarea id="bodyHtml" placeholder="<p>Hola {{username}}...</p>"></textarea>

          <label>Cuerpo texto plano (opcional)</label>
          <textarea id="bodyText" style="min-height:80px;" placeholder="Hola {{username}}..."></textarea>

          <div class="row">
            <button class="success" onclick="saveTemplate()">Guardar cambios</button>
            <button class="secondary" onclick="previewTemplate()">Previsualizar</button>
            <button class="secondary" onclick="toggleActive()" id="toggleActiveBtn">Activar/Desactivar</button>
            <button class="danger" onclick="deleteTemplateAction()" id="deleteBtn" style="display:none;">Eliminar</button>
          </div>

          <div id="editorAlert" class="alert" style="display:none;"></div>

          <div id="previewArea" style="display:none;">
            <div class="preview-header">
              <b>Vista previa</b> · Asunto: <span id="previewSubject"></span>
            </div>
            <div class="preview-box" id="previewBody"></div>
          </div>
        </section>

        <section class="card" id="emptyCard">
          <h2>Editor</h2>
          <p class="muted">Selecciona una plantilla de la lista o crea una nueva.</p>
        </section>
      </div>

    </div>
  </main>

<script>
  let templates = [];
  let currentId = null;
  let isCreating = false;

  function showAlert(type, message) {
    const el = document.getElementById('editorAlert');
    el.className = 'alert ' + type;
    el.textContent = message;
    el.style.display = 'block';
  }
  function hideAlert() {
    document.getElementById('editorAlert').style.display = 'none';
  }

  async function request(path, options) {
    options = options || {};
    options.credentials = 'include';
    const res = await fetch(path, options);
    const text = await res.text();
    let data;
    try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
    if (res.status === 401) {
      window.location.href = '/static/login.html';
      throw data;
    }
    if (!res.ok) throw data;
    return data;
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function renderList() {
    const container = document.getElementById('templatesList');
    if (!templates.length) {
      container.innerHTML = '<div class="muted">No hay plantillas.</div>';
      return;
    }
    container.innerHTML = templates.map(function(t) {
      const isActiveItem = currentId === t.id ? ' active' : '';
      const badge = t.isSystem
        ? '<span class="badge system">Sistema</span>'
        : '<span class="badge custom">Custom</span>';
      const inactiveBadge = t.active ? '' : '<span class="badge inactive">Inactiva</span>';
      return '<div class="tpl-item' + isActiveItem + '" onclick="selectTemplate(\'' +
        t.id + '\')">' +
        '<div class="tpl-code">' + escapeHtml(t.code) + badge + inactiveBadge + '</div>' +
        '<div class="tpl-name">' + escapeHtml(t.name) + '</div>' +
        '</div>';
    }).join('');
  }

  async function loadTemplates() {
    try {
      const data = await request('/api/templates');
      templates = data.templates || [];
      renderList();
    } catch (e) {
      document.getElementById('templatesList').innerHTML =
        '<div class="alert error" style="display:block;">' +
        ((e && e.message) || 'Error cargando.') + '</div>';
    }
  }

  function selectTemplate(id) {
    isCreating = false;
    currentId = id;
    const t = templates.find(function(x) { return x.id === id; });
    if (!t) return;

    document.getElementById('emptyCard').style.display = 'none';
    document.getElementById('editorCard').style.display = 'block';
    document.getElementById('editorTitle').textContent =
      'Editar: ' + t.code + (t.isSystem ? ' (Sistema)' : '');

    document.getElementById('code').value = t.code;
    document.getElementById('code').disabled = true;
    document.getElementById('name').value = t.name;
    document.getElementById('description').value = t.description || '';
    document.getElementById('subject').value = t.subject;
    document.getElementById('bodyHtml').value = t.bodyHtml;
    document.getElementById('bodyText').value = t.bodyText || '';

    document.getElementById('deleteBtn').style.display = t.isSystem ? 'none' : 'inline-block';

    const varsBox = document.getElementById('variablesBox');
    const varsChips = document.getElementById('variablesChips');
    if (t.variables && Object.keys(t.variables).length > 0) {
      varsBox.style.display = 'block';
      varsChips.innerHTML = Object.entries(t.variables).map(function(entry) {
        const key = entry[0];
        const desc = entry[1];
        return '<span class="var-chip" title="' + escapeHtml(desc) +
          '" onclick="insertVar(\'' + key + '\')">{{' + key + '}}</span>';
      }).join('');
    } else {
      varsBox.style.display = 'none';
    }

    document.getElementById('previewArea').style.display = 'none';
    hideAlert();
    renderList();
  }

  function insertVar(key) {
    const textarea = document.getElementById('bodyHtml');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const value = textarea.value;
    textarea.value = value.substring(0, start) + '{{' + key + '}}' + value.substring(end);
    textarea.focus();
    const newPos = start + key.length + 4;
    textarea.setSelectionRange(newPos, newPos);
  }

  function openNewForm() {
    isCreating = true;
    currentId = null;

    document.getElementById('emptyCard').style.display = 'none';
    document.getElementById('editorCard').style.display = 'block';
    document.getElementById('editorTitle').textContent = 'Nueva plantilla';

    document.getElementById('code').value = '';
    document.getElementById('code').disabled = false;
    document.getElementById('name').value = '';
    document.getElementById('description').value = '';
    document.getElementById('subject').value = '';
    document.getElementById('bodyHtml').value = '';
    document.getElementById('bodyText').value = '';
    document.getElementById('deleteBtn').style.display = 'none';
    document.getElementById('variablesBox').style.display = 'none';
    document.getElementById('previewArea').style.display = 'none';
    hideAlert();
    renderList();
  }

  async function saveTemplate() {
    hideAlert();
    const code = document.getElementById('code').value.trim().toUpperCase();
    const name = document.getElementById('name').value.trim();
    const description = document.getElementById('description').value.trim();
    const subject = document.getElementById('subject').value;
    const bodyHtml = document.getElementById('bodyHtml').value;
    const bodyText = document.getElementById('bodyText').value;

    if (!name || !subject || !bodyHtml) {
      showAlert('error', 'Nombre, asunto y cuerpo HTML son obligatorios.');
      return;
    }

    try {
      if (isCreating) {
        if (!code || !/^[A-Z0-9_]+$/.test(code)) {
          showAlert('error', 'Código inválido: solo MAYÚSCULAS_NUMEROS_GUIONES_BAJOS.');
          return;
        }
        const data = await request('/api/templates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, name, description, subject, bodyHtml, bodyText })
        });
        showAlert('success', data.message || 'Creada.');
        isCreating = false;
        currentId = data.template.id;
        await loadTemplates();
        selectTemplate(currentId);
      } else {
        const data = await request('/api/templates/' + encodeURIComponent(currentId), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, subject, bodyHtml, bodyText })
        });
        showAlert('success', data.message || 'Actualizada.');
        await loadTemplates();
        selectTemplate(currentId);
      }
    } catch (e) {
      showAlert('error', (e && e.message) || 'No se pudo guardar.');
    }
  }

  async function toggleActive() {
    if (isCreating || !currentId) return;
    const t = templates.find(function(x) { return x.id === currentId; });
    if (!t) return;
    try {
      await request('/api/templates/' + encodeURIComponent(currentId), {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ active: !t.active })
      });
      await loadTemplates();
      selectTemplate(currentId);
    } catch (e) {
      showAlert('error', (e && e.message) || 'No se pudo cambiar el estado.');
    }
  }

  async function deleteTemplateAction() {
    if (isCreating || !currentId) return;
    if (!confirm('¿Eliminar esta plantilla? Esta acción no se puede deshacer.')) return;
    try {
      await request('/api/templates/' + encodeURIComponent(currentId), { method: 'DELETE' });
      currentId = null;
      document.getElementById('editorCard').style.display = 'none';
      document.getElementById('emptyCard').style.display = 'block';
      await loadTemplates();
    } catch (e) {
      showAlert('error', (e && e.message) || 'No se pudo eliminar.');
    }
  }

  function previewTemplate() {
    const subject = document.getElementById('subject').value;
    const bodyHtml = document.getElementById('bodyHtml').value;
    document.getElementById('previewArea').style.display = 'block';
    document.getElementById('previewSubject').textContent = subject;
    document.getElementById('previewBody').innerHTML = bodyHtml;
  }

  loadTemplates();
</script>
</body>
</html>
